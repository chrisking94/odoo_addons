name: Test MCP Base Compatibility

on:
  push:
    branches: [main, '15.0', '16.0', '17.0', '18.0']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        odoo-version: ['15.0', '16.0', '17.0', '18.0']
        include:
          - odoo-version: '15.0'
            python-version: '3.10'
          - odoo-version: '16.0'
            python-version: '3.10'
          - odoo-version: '17.0'
            python-version: '3.10'
          - odoo-version: '18.0'
            python-version: '3.12'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools

      - name: Install Odoo ${{ matrix.odoo-version }}
        run: |
          if [ "${{ matrix.odoo-version }}" = "15.0" ]; then
            pip install odoo==15.0
          elif [ "${{ matrix.odoo-version }}" = "16.0" ]; then
            pip install odoo==16.0
          elif [ "${{ matrix.odoo-version }}" = "17.0" ]; then
            pip install odoo==17.0
          elif [ "${{ matrix.odoo-version }}" = "18.0" ]; then
            pip install odoo==18.0
          fi

      - name: Create Odoo configuration
        run: |
          cat > odoo.conf << EOF
          [options]
          addons_path = /home/runner/work/odoo_addons/odoo_addons
          db_host = localhost
          db_port = 5432
          db_user = odoo
          db_password = odoo
          log_level = test
          EOF

      - name: Run Odoo tests
        run: |
          odoo -c odoo.conf \
               -i mcp_base \
               --test-enable \
               --stop-after-init \
               -d test_mcp_${{ matrix.odoo-version }} \
               --db_host=localhost \
               --db_port=5432 \
               --db_user=odoo \
               --db_password=odoo
        env:
          PGPASSWORD: odoo

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: odoo-logs-${{ matrix.odoo-version }}
          path: ~/.local/share/Odoo/log/*.log
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linting tools
        run: |
          pip install pylint
          pip install pylint-odoo

      - name: Run pylint
        run: |
          pylint --load-plugins=pylint_odoo \
                 --rcfile=/dev/null \
                 mcp_base/ || true
